services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: colossus-clickhouse
    ports:
      - "8123:8123"   # HTTP interface (used by Bake)
      - "9000:9000"   # native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: colossus
      CLICKHOUSE_USER: colossus
      CLICKHOUSE_PASSWORD: colossus
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

volumes:
  clickhouse-data:
